<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkiMotion LED Race Control</title>
    <!-- Librerías de MediaPipe -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/control_utils/control_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js" crossorigin="anonymous"></script>
    
    <!-- Librería Paho MQTT para Web -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/paho-mqtt/1.0.1/mqttws31.min.js" type="text/javascript"></script>
    
    <style>
        /* --- ESTILOS GENERALES --- */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0a0a0a; color: #ffffff;
            margin: 0; padding: 10px; display: flex; flex-direction: column;
            align-items: center; overflow: hidden; /* Evitar scroll */
        }
        
        .header-controls {
            display: flex; gap: 15px; align-items: center; width: 95vw; 
            justify-content: space-between; margin-bottom: 10px;
        }

        /* --- CONTENEDOR DE CÁMARA CASI FULL SCREEN --- */
        .container { 
            position: relative; 
            width: 95vw; height: 85vh; /* Casi pantalla completa */
            border: 4px solid #333; border-radius: 15px; 
            overflow: hidden; box-shadow: 0 0 30px rgba(255, 255, 255, 0.1);
            background-color: #000; display: flex; justify-content: center; align-items: center;
        }
        video { display: none; }
        canvas {
            width: 100%; height: 100%; object-fit: cover; /* Llena el contenedor sin deformar */
        }

        /* --- UI SUPERPUESTA EN LA CÁMARA --- */
        .overlay-ui {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; display: flex; flex-direction: column;
            justify-content: space-between; padding: 30px; box-sizing: border-box;
        }

        /* --- VELOCÍMETRO CIRCULAR ESTILO F1 --- */
        .speedometer-container {
            align-self: flex-start; background: rgba(0, 0, 0, 0.6);
            padding: 15px; border-radius: 15px; border: 1px solid #444;
            display: flex; flex-direction: column; align-items: center;
            box-shadow: 0 0 20px rgba(0,0,0,0.8); backdrop-filter: blur(5px);
        }
        .speedometer-svg { width: 150px; height: 75px; }
        .speed-track { fill: none; stroke: #222; stroke-width: 12; }
        .speed-bar {
            fill: none; stroke: #4CAF50; stroke-width: 12; stroke-linecap: round;
            stroke-dasharray: 125.6; /* Longitud del semicírculo (Pi * r) */
            stroke-dashoffset: 125.6; /* Oculto al inicio */
            transition: stroke-dashoffset 0.2s ease-out, stroke 0.3s;
        }
        .speed-text-box { text-align: center; margin-top: -20px; }
        #speed-value { font-size: 2.5rem; font-weight: 900; font-family: 'Courier New', Courier, monospace; text-shadow: 0 0 10px rgba(255,255,255,0.5);}
        .speed-unit { font-size: 0.9rem; color: #aaa; font-weight: bold; letter-spacing: 1px; }

        .counter-box {
            align-self: flex-end; background: rgba(0,0,0,0.7); border: 2px solid #555;
            padding: 10px 25px; border-radius: 15px; font-size: 1.2rem; font-weight: bold;
            text-align: center; box-shadow: 0 0 15px rgba(0,0,0,0.5);
        }
        #count { color: #03A9F4; font-size: 3rem; display: block; line-height: 1; margin-top: 5px; text-shadow: 0 0 15px #03A9F4;}

        /* --- BOTONES E INDICADORES --- */
        button {
            background-color: #333; color: white; border: 1px solid #555;
            padding: 10px 20px; border-radius: 8px; cursor: pointer;
            font-size: 1rem; font-weight: bold; transition: 0.2s; pointer-events: auto;
        }
        button:hover { background-color: #555; }
        button.action { background-color: #673ab7; border-color: #512da8; }
        button.success { background-color: #388e3c; border-color: #2e7d32; }
        button.warning { background-color: #f57c00; border-color: #e65100; }

        #status-indicator { 
            padding: 8px 20px; border-radius: 20px; font-size: 1rem; font-weight: bold; 
            background-color: #ff9800; text-transform: uppercase; letter-spacing: 1px;
            box-shadow: 0 0 10px rgba(255, 152, 0, 0.5);
        }

        /* --- VENTANA MODAL DE CONFIGURACIÓN --- */
        .modal {
            display: none; position: fixed; z-index: 1000; left: 0; top: 0;
            width: 100%; height: 100%; background-color: rgba(0,0,0,0.85);
            align-items: center; justify-content: center; backdrop-filter: blur(4px);
        }
        .modal-content {
            background-color: #1a1a1a; padding: 30px; border-radius: 15px;
            width: 90%; max-width: 650px; box-shadow: 0 10px 40px rgba(0,0,0,1);
            position: relative; border: 1px solid #444;
        }
        .close-btn {
            position: absolute; top: 15px; right: 20px; color: #888;
            font-size: 30px; font-weight: bold; cursor: pointer;
        }
        .close-btn:hover { color: white; }

        .config-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); 
            gap: 15px; margin: 20px 0;
        }
        .config-item { display: flex; flex-direction: column; }
        .config-item label { font-size: 0.85rem; color: #bbb; margin-bottom: 5px; }
        .config-item input, .config-item select {
            background-color: #2c2c2c; color: white; border: 1px solid #555;
            padding: 10px; border-radius: 5px; font-size: 1rem; outline: none;
        }
        #mqtt-status { padding: 5px 15px; border-radius: 5px; font-size: 0.9rem; font-weight: bold; background-color: #d32f2f; color: white; }
    </style>
</head>
<body>

    <!-- BARRA SUPERIOR -->
    <div class="header-controls">
        <h2 style="margin: 0; text-shadow: 0 0 10px rgba(255,255,255,0.3);">⛷️ SkiMotion LED</h2>
        <span id="status-indicator">Iniciando cámara...</span>
        <div>
            <button class="action" onclick="openModal()">⚙️ Ajustes / F1</button>
            <button id="btn-pause" onclick="togglePause()">⏸️ Pausar</button>
        </div>
    </div>

    <!-- MODAL DE CONFIGURACIÓN -->
    <div id="configModal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModal()">&times;</span>
            <h3 style="margin-top:0;">⚙️ Panel de Control ESP8266</h3>
            
            <div class="config-grid">
                <div class="config-item"><label>Broker MQTT (IP/URL):</label><input type="text" id="mqtt-host" value="192.168.1.1"></div>
                <div class="config-item"><label>Puerto WebSockets:</label><input type="number" id="mqtt-port" value="9001"></div>
                <div class="config-item"><label>Ruta (WS Path):</label><input type="text" id="mqtt-path" value="/"></div>
                <div class="config-item"><label>Prefijo Pista:</label><input type="text" id="mqtt-prefix" value="track01"></div>
                <div class="config-item">
                    <label>Jugador de esta cámara:</label>
                    <select id="player-select" onchange="updateUIColors()">
                        <option value="greencar">🟢 Coche Verde (P1)</option>
                        <option value="redcar">🔴 Coche Rojo (P2)</option>
                    </select>
                </div>
            </div>
            
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; background: #222; padding: 10px; border-radius: 8px;">
                <button onclick="connectMQTT()">🔌 Conectar a MQTT</button>
                <span id="mqtt-status">Desconectado</span>
            </div>

            <div style="display: flex; gap: 15px; align-items: center; border-top: 1px solid #444; padding-top: 20px;">
                <button class="success" onclick="sendF1Start()">🚦 SALIDA F1</button>
                <input type="number" id="laps-input" value="5" min="1" max="99" style="width: 60px; background:#2c2c2c; color:white; border:1px solid #555; padding:10px; border-radius:5px;">
                <button class="warning" onclick="sendLaps()">⚙️ Fijar Vueltas</button>
                <label style="margin-left:auto; color:#aaa; cursor:pointer;"><input type="checkbox" id="chk-skeleton" checked> Esqueleto</label>
            </div>
        </div>
    </div>

    <!-- CÁMARA, VIDEO Y UI SUPERPUESTA -->
    <div class="container">
        <video id="video_element" autoplay playsinline muted></video>
        <canvas id="canvas_element" width="1280" height="720"></canvas>
        
        <div class="overlay-ui">
            <!-- Velocímetro Circular -->
            <div class="speedometer-container">
                <div id="player-label" style="font-size:0.8rem; font-weight:bold; margin-bottom:5px; color:#4CAF50;">P1 (VERDE)</div>
                <svg class="speedometer-svg" viewBox="0 0 100 50">
                    <!-- Fondo del arco -->
                    <path class="speed-track" d="M 10 45 A 40 40 0 0 1 90 45" />
                    <!-- Barra de progreso -->
                    <path class="speed-bar" id="speed-bar" d="M 10 45 A 40 40 0 0 1 90 45" />
                </svg>
                <div class="speed-text-box">
                    <div id="speed-value">0.0</div>
                    <div class="speed-unit">KM/H</div>
                </div>
            </div>

            <!-- Contador -->
            <div class="counter-box">
                Impulsos <span id="count">0</span>
            </div>
        </div>
    </div>

    <script>
        // ==========================================
        // 0. CONTROL DE UI Y MODAL
        // ==========================================
        const modal = document.getElementById("configModal");
        function openModal() { modal.style.display = "flex"; }
        function closeModal() { modal.style.display = "none"; }
        
        function updateUIColors() {
            const player = document.getElementById('player-select').value;
            const speedBar = document.getElementById('speed-bar');
            const label = document.getElementById('player-label');
            if(player === 'greencar') {
                speedBar.style.stroke = '#4CAF50';
                label.innerText = 'P1 (VERDE)';
                label.style.color = '#4CAF50';
            } else {
                speedBar.style.stroke = '#F44336';
                label.innerText = 'P2 (ROJO)';
                label.style.color = '#F44336';
            }
            updateSpeedometer(0); // reset visual
        }

        // Actualizar SVG circular
        function updateSpeedometer(speed) {
            const speedEl = document.getElementById('speed-value');
            const speedBar = document.getElementById('speed-bar');
            
            speedEl.innerText = parseFloat(speed).toFixed(1);
            
            // Calculo para el SVG (Max speed visual 50 km/h)
            const MAX_SPEED = 50.0; 
            let percentage = speed / MAX_SPEED;
            if (percentage > 1) percentage = 1;
            
            const maxDashoffset = 125.6; // Valor cuando está vacío (Pi * Radio=40)
            const currentOffset = maxDashoffset - (percentage * maxDashoffset);
            
            speedBar.style.strokeDashoffset = currentOffset;
            
            // Efecto de brillo si va rápido
            if (percentage > 0.8) {
                speedBar.style.filter = "drop-shadow(0px 0px 8px " + speedBar.style.stroke + ")";
            } else {
                speedBar.style.filter = "none";
            }
        }

        // ==========================================
        // 1. MQTT Y TELEMETRÍA
        // ==========================================
        let mqttClient = null;
        let isMqttConnected = false;

        function connectMQTT() {
            const host = document.getElementById('mqtt-host').value.trim();
            const port = parseInt(document.getElementById('mqtt-port').value);
            const path = document.getElementById('mqtt-path').value.trim() || "/";
            const prefix = document.getElementById('mqtt-prefix').value.trim();
            const statusBadge = document.getElementById('mqtt-status');
            
            const clientId = "SkiWeb_" + Math.random().toString(16).substr(2, 8);
            
            try { mqttClient = new Paho.MQTT.Client(host, port, path, clientId); } 
            catch (error) { alert("Error cliente MQTT. Usa HTTP normal, no HTTPS."); return; }

            mqttClient.onConnectionLost = function(responseObject) {
                isMqttConnected = false;
                statusBadge.innerText = "Desconectado";
                statusBadge.style.backgroundColor = "#d32f2f";
            };

            mqttClient.onMessageArrived = function(message) {
                const topic = message.destinationName;
                const player = document.getElementById('player-select').value;
                const targetSpeedTopic = player === 'greencar' ? `${prefix}/greenspeed` : `${prefix}/redspeed`;

                if (topic === targetSpeedTopic) {
                    updateSpeedometer(message.payloadString);
                }
            };

            const options = {
                onSuccess: function() {
                    isMqttConnected = true;
                    statusBadge.innerText = "Conectado ✅";
                    statusBadge.style.backgroundColor = "#388e3c";
                    mqttClient.subscribe(`${prefix}/greenspeed`);
                    mqttClient.subscribe(`${prefix}/redspeed`);
                },
                onFailure: function() {
                    isMqttConnected = false;
                    statusBadge.innerText = "Error WS";
                    statusBadge.style.backgroundColor = "#d32f2f";
                }
            };

            statusBadge.innerText = "Conectando..."; statusBadge.style.backgroundColor = "#ff9800";
            mqttClient.connect(options);
        }

        function sendMQTTCommand(topic, payload) {
            if (isMqttConnected && mqttClient) {
                const message = new Paho.MQTT.Message(payload.toString());
                message.destinationName = topic;
                mqttClient.send(message);
            }
        }

        function sendF1Start() {
            const prefix = document.getElementById('mqtt-prefix').value.trim();
            sendMQTTCommand(`${prefix}/start`, "1");
            repeticiones = 0;
            document.getElementById('count').innerText = repeticiones;
            updateSpeedometer(0);
            closeModal();
        }

        function sendLaps() {
            const prefix = document.getElementById('mqtt-prefix').value.trim();
            const laps = document.getElementById('laps-input').value;
            sendMQTTCommand(`${prefix}/set_laps`, laps);
            alert(`Vueltas configuradas: ${laps}`);
        }

        // ==========================================
        // 2. EFECTOS VISUALES: EXPLOSIÓN DE NIEVE DESDE EL PECHO
        // ==========================================
        let snowParticles = [];

        function triggerSnowExplosion(landmarks) {
            // Calcular el centro del pecho (entre los hombros)
            const hIzq = landmarks[11];
            const hDer = landmarks[12];
            
            // Coordenadas normalizadas a píxeles del canvas
            const originX = ((hIzq.x + hDer.x) / 2) * canvasElement.width;
            const originY = ((hIzq.y + hDer.y) / 2) * canvasElement.height;

            // Generar ráfaga de partículas desde el centro
            for (let i = 0; i < 60; i++) {
                snowParticles.push({
                    x: originX,
                    y: originY,
                    vx: (Math.random() - 0.5) * 30, // Explosión lateral
                    vy: (Math.random() - 0.8) * 20, // Explosión hacia arriba/lados
                    r: Math.random() * 4 + 2,       // Tamaño
                    life: 1.0                       // Tiempo de vida (opacidad)
                });
            }
        }

        function updateAndDrawSnow(ctx) {
            if (snowParticles.length === 0) return;
            
            for (let i = snowParticles.length - 1; i >= 0; i--) {
                let p = snowParticles[i];
                
                // Físicas: Gravedad y fricción
                p.vy += 1.2; // Gravedad tira hacia abajo
                p.x += p.vx;
                p.y += p.vy;
                p.life -= 0.02; // Desvanecimiento

                if (p.life <= 0 || p.y > canvasElement.height) {
                    snowParticles.splice(i, 1); // Eliminar partícula muerta
                    continue;
                }

                // Dibujar
                ctx.fillStyle = `rgba(255, 255, 255, ${p.life})`;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        // ==========================================
        // 3. LÓGICA DE VISIÓN, ESQUÍ Y TRUCO "GALLINA" MEJORADO
        // ==========================================
        const videoElement = document.getElementById('video_element');
        const canvasElement = document.getElementById('canvas_element');
        const canvasCtx = canvasElement.getContext('2d');
        const countDisplay = document.getElementById('count');
        const statusIndicator = document.getElementById('status-indicator');

        let repeticiones = 0;
        let estadoEsqui = 'ABAJO';
        let estadoGallina = 'ADENTRO'; // Nueva lógica
        let isPaused = false;
        let isProcessing = false;

        const L_SHOULDER = 11, R_SHOULDER = 12;
        const L_ELBOW = 13, R_ELBOW = 14;
        const L_WRIST = 15, R_WRIST = 16;
        const L_HIP = 23, R_HIP = 24;

        function onResults(results) {
            isProcessing = false;
            if (isPaused) return;

            canvasCtx.save();
            canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
            canvasCtx.drawImage(results.image, 0, 0, canvasElement.width, canvasElement.height);

            if (results.poseLandmarks) {
                if (document.getElementById('chk-skeleton').checked) {
                    drawConnectors(canvasCtx, results.poseLandmarks, POSE_CONNECTIONS, {color: '#ffffff', lineWidth: 4});
                    drawLandmarks(canvasCtx, results.poseLandmarks, {color: '#FF0000', lineWidth: 2, radius: 3});
                }
                analizarMovimientos(results.poseLandmarks);
            }
            
            updateAndDrawSnow(canvasCtx);
            canvasCtx.restore();
        }

        function analizarMovimientos(landmarks) {
            // EJE Y (Altura)
            const mIzqY = landmarks[L_WRIST].y, mDerY = landmarks[R_WRIST].y;
            const hIzqY = landmarks[L_SHOULDER].y, hDerY = landmarks[R_SHOULDER].y;
            const cadIzqY = landmarks[L_HIP].y, cadDerY = landmarks[R_HIP].y;
            
            // EJE X (Anchura para la gallina)
            const cIzqX = landmarks[L_ELBOW].x, cDerX = landmarks[R_ELBOW].x;
            const hIzqX = landmarks[L_SHOULDER].x, hDerX = landmarks[R_SHOULDER].x;

            // --- 1. CÁLCULOS ESQUÍ CLÁSICO ---
            const torsoLengthIzq = cadIzqY - hIzqY;
            const torsoLengthDer = cadDerY - hDerY;
            
            const mitadTorsoIzq = hIzqY + (torsoLengthIzq * 0.5);
            const mitadTorsoDer = hDerY + (torsoLengthDer * 0.5);
            const cercaCaderaIzq = cadIzqY - (torsoLengthIzq * 0.15);
            const cercaCaderaDer = cadDerY - (torsoLengthDer * 0.15);

            const manosArriba = (mIzqY < mitadTorsoIzq) && (mDerY < mitadTorsoDer);
            const manosAbajo = (mIzqY > cercaCaderaIzq) && (mDerY > cercaCaderaDer);

            // --- 2. CÁLCULOS TRUCO GALLINA (Aleteo pegando codos al cuerpo) ---
            // Las manos deben estar en la zona alta (cerca del pecho)
            const manosEnPecho = (mIzqY < hIzqY + (torsoLengthIzq * 0.4)) && (mDerY < hDerY + (torsoLengthDer * 0.4));
            
            // Anchura de hombros vs Anchura de Codos
            const anchuraHombros = Math.abs(hIzqX - hDerX);
            const anchuraCodos = Math.abs(cIzqX - cDerX);

            // Aleteo Afuera: Codos separados del cuerpo (> 1.6x la anchura de hombros)
            const codosAfuera = anchuraCodos > (anchuraHombros * 1.6);
            // Aleteo Adentro: Codos pegados a las costillas (< 1.2x la anchura de hombros)
            const codosAdentro = anchuraCodos < (anchuraHombros * 1.25);

            // LÓGICA DE DETECCIÓN GALLINA
            if (manosEnPecho) {
                if (codosAfuera) {
                    if (estadoGallina !== 'AFUERA') estadoGallina = 'AFUERA';
                } else if (codosAdentro) {
                    if (estadoGallina === 'AFUERA') {
                        estadoGallina = 'ADENTRO';
                        registrarImpulso("¡Gallina! x2 🐔🔥", 2, landmarks);
                        return; // Evita que cuente esquí normal a la vez
                    }
                }
            } else {
                // Si bajan las manos, se reinicia la gallina
                estadoGallina = 'ADENTRO'; 
            }

            // LÓGICA DE DETECCIÓN ESQUÍ
            if (manosArriba) {
                if (estadoEsqui !== 'ARRIBA') {
                    estadoEsqui = 'ARRIBA';
                    statusIndicator.innerText = "¡LISTO!";
                    statusIndicator.style.backgroundColor = "#2196F3"; 
                    statusIndicator.style.boxShadow = "0 0 10px rgba(33, 150, 243, 0.5)";
                }
            } else if (manosAbajo) {
                if (estadoEsqui === 'ARRIBA') {
                    estadoEsqui = 'ABAJO';
                    registrarImpulso("¡Impulso! ⛷️", 1, landmarks);
                }
            }
        }

        function registrarImpulso(mensaje, cantidad, landmarks) {
            repeticiones += cantidad;
            countDisplay.innerText = repeticiones;
            
            statusIndicator.innerText = mensaje;
            if(cantidad > 1) {
                statusIndicator.style.backgroundColor = "#9c27b0";
                statusIndicator.style.boxShadow = "0 0 15px rgba(156, 39, 176, 0.8)";
            } else {
                statusIndicator.style.backgroundColor = "#4CAF50";
                statusIndicator.style.boxShadow = "0 0 15px rgba(76, 175, 80, 0.8)";
            }
            
            triggerSnowExplosion(landmarks); // Explosión de nieve del pecho
            
            // Enviar aceleración al MQTT
            const prefix = document.getElementById('mqtt-prefix').value.trim();
            const player = document.getElementById('player-select').value;
            
            sendMQTTCommand(`${prefix}/${player}`, "1");
            if (cantidad > 1) {
                setTimeout(() => sendMQTTCommand(`${prefix}/${player}`, "1"), 150);
            }

            // Animación del número
            countDisplay.style.transform = "scale(1.3)";
            setTimeout(() => countDisplay.style.transform = "scale(1)", 150);
        }

        // ==========================================
        // 4. INICIALIZACIÓN DE CÁMARA
        // ==========================================
        const pose = new Pose({locateFile: (file) => {
            return `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}`;
        }});

        pose.setOptions({
            modelComplexity: 1, smoothLandmarks: true,
            minDetectionConfidence: 0.5, minTrackingConfidence: 0.5
        });
        pose.onResults(onResults);

        async function startCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: "user", width: { ideal: 1280 }, height: { ideal: 720 } }
                });
                videoElement.srcObject = stream;
                videoElement.onloadedmetadata = () => {
                    videoElement.play();
                    statusIndicator.innerText = "CÁMARA OK";
                    processVideo(); 
                };
            } catch (err) {
                statusIndicator.innerText = "ERROR CÁMARA";
                alert("Verifica permisos o usa HTTP local.");
            }
        }

        async function processVideo() {
            if (!isPaused && !isProcessing && videoElement.readyState >= 2) {
                isProcessing = true;
                await pose.send({image: videoElement});
            }
            requestAnimationFrame(processVideo);
        }

        function togglePause() {
            isPaused = !isPaused;
            const btnPause = document.getElementById('btn-pause');
            if (isPaused) {
                btnPause.innerText = "▶️ Reanudar";
                statusIndicator.innerText = "PAUSADO";
                statusIndicator.style.backgroundColor = "#ff9800";
            } else {
                btnPause.innerText = "⏸️ Pausar";
                statusIndicator.innerText = "REANUDADO";
            }
        }

        updateUIColors();
        updateSpeedometer(0);
        startCamera();
    </script>
</body>
</html>
